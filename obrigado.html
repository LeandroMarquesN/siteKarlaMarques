<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karla Marques | Terapia Integrativa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #F8FAFC; overflow-x: hidden; }
        
        /* Efeito Inicial da Nav (Transparente) */
        .glass-nav {
            transition: all 0.4s ease-in-out;
            background: transparent;
            border-bottom: 1px solid transparent;
        }

        /* Efeito quando rolar a página */
        .glass-nav.scrolled {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-color: rgba(224, 242, 254, 1);
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
        }

        .photo-card {
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .photo-card:hover {
            transform: scale(1.02) translateY(-15px);
            box-shadow: 0 40px 80px -15px rgba(56, 189, 248, 0.3);
        }

        .carousel-track {
            display: flex;
            gap: 2rem;
            overflow-x: hidden;
            scroll-behavior: auto;
            white-space: nowrap;
            padding: 20px 0;
        }

        .testimonial-card {
            min-width: 380px;
            flex-shrink: 0;
        }

        /* Menu Mobile lateral */
        #mobile-menu {
            position: fixed;
            top: 0;
            right: 0;
            height: 100%;
            width: 280px;
            background: white;
            z-index: 60;
            transform: translateX(100%);
            transition: transform 0.4s ease-in-out;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }
        #mobile-menu.open { transform: translateX(0); }
    </style>
</head>
<body class="text-slate-700">

    <div id="mobile-menu" class="p-10 flex flex-col space-y-6">
        <button id="close-menu" class="self-end text-slate-400">Fechar ✕</button>
        <a href="#home" class="text-xl font-semibold">Home</a>
        <a href="#metodologia" class="text-xl font-semibold">Metodologia</a>
        <a href="#depoimentos" class="text-xl font-semibold">Depoimentos</a>
        <hr>
       
    </div>

    <section id="home" class="pt-64 pb-20 px-6 min-h-screen flex items-center">
        <div class="max-w-7xl mx-auto grid md:grid-cols-2 gap-16 items-center">
            <div class="space-y-8">
                
                <h1 class="text-6xl lg:text-8xl font-semibold text-slate-900 leading-tight">Agradecemos oseu interesse. <span class="text-sky-400 font-light italic text-7xl">logo entraremos em contato.</span></h1>
               
                <div class="flex gap-4"><a href="https://leandromarquesn.github.io/siteKarlaMarques/" class="px-10 py-5 bg-sky-500 text-white rounded-[2rem] font-semibold hover:bg-sky-600 transition shadow-2xl shadow-sky-200">voltar a pagina inicial</a></div>
            </div>
           
            <!-- teste -->
             
    
    <div class="relative cursor-pointer max-w-[180px] md:max-w-[220px] transform -translate-y-8 transition-all duration-500 ease-in-out z-10 hover:z-50 group-hover:z-0 hover:scale-110">
        <div class="absolute -inset-4 bg-sky-100/10 rounded-full blur-2xl opacity-0 hover:opacity-100 transition-opacity duration-1000"></div>
        <div class="relative rounded-[2.5rem] shadow-sm hover:shadow-xl border-[6px] border-white bg-white overflow-hidden transition-all duration-700 ease-in-out hover:-rotate-2">
            <img src="./imagen/fotos consultorio/KARLA3.JPG" 
                 class="w-full aspect-[3/4] object-cover transition-all duration-1000 ease-out transform scale-[1.05] hover:scale-100" 
                 alt="Consultório">
        </div>
    </div>
</body>
