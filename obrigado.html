<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrigado | Karla Marques</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #F8FAFC; 
            background-image: radial-gradient(circle at top right, #f0f9ff 0%, transparent 40%);
        }
        .photo-card { 
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1); 
        }
    </style>
</head>
<body class="text-slate-700 min-h-screen flex items-center justify-center p-6 md:p-12">

    <div class="max-w-6xl w-full mx-auto grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-20 items-center">
        
        <div class="flex justify-center order-1 lg:order-2">
            <div class="relative photo-card hover:-rotate-2 hover:scale-105 group">
                <div class="absolute -inset-6 bg-sky-200/40 rounded-full blur-3xl opacity-60 group-hover:opacity-100 transition-opacity"></div>
                
                <div class="relative rounded-[3rem] md:rounded-[4rem] border-[8px] border-white bg-white shadow-2xl overflow-hidden w-56 sm:w-64 md:w-80 lg:w-96">
                    <img src="./imagen/fotos consultorio/KARLA3.JPG" 
                         class="w-full aspect-[3/4] object-cover transition-transform duration-700 group-hover:scale-110" 
                         alt="Karla Marques">
                </div>
            </div>
        </div>

        <div class="space-y-6 md:space-y-10 order-2 lg:order-1 text-center lg:text-left">
            <div class="inline-block px-4 py-2 bg-sky-100 text-sky-600 rounded-full text-xs font-bold uppercase tracking-widest mb-2">
                Sucesso!
            </div>
            
            <h1 class="text-4xl sm:text-5xl lg:text-7xl font-semibold text-slate-900 leading-[1.1]">
                Agradecemos o seu <span class="text-sky-400 font-light italic">interesse.</span>
            </h1>
            
            <p class="text-lg sm:text-xl text-slate-500 font-light max-w-lg mx-auto lg:mx-0">
                Logo entraremos em contato para confirmar os detalhes do seu agendamento.
            </p>
            
            <div class="pt-6">
                <a href="https://leandromarquesn.github.io/siteKarlaMarques/" 
                   class="inline-block w-full sm:w-auto px-12 py-5 bg-sky-500 text-white rounded-[2rem] font-semibold hover:bg-sky-600 transition-all shadow-xl shadow-sky-200 uppercase tracking-widest text-sm active:scale-95">
                    Voltar ao Início
                </a>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        window.onload = () => {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#0ea5e9', '#38bdf8', '#bae6fd']
            });
        };
    </script>

</body>
</html>
